const fmt = (n) => "RM " + n.toLocaleString("en-MY");

const STATUS_MAP = {
  "Rolling": "red", "On Set": "red", "Checked Out": "red", "Pending Review": "amber", "Due": "amber",
  "Wrapped": "green", "Approved": "green", "Paid": "green", "Available": "green", "Production": "red",
  "Upcoming": "amber", "Scheduled": "amber", "On Leave": "amber", "Maintenance": "amber", "Post-Production": "amber",
  "Unscheduled": "mist", "Changes Requested": "red", "Pre-Production": "green",
  "Pending": "amber", "Rejected": "red", "Raw": "mist", "Final": "green", "Draft": "amber",
  "High": "red", "Medium": "amber", "Low": "mist",
  "Valid": "green", "Expiring Soon": "amber", "Expired": "red",
};

function Badge({ status }) {
  const c = STATUS_MAP[status] || "mist";
  return <span className={`badge badge-${c}`}>{status}</span>;
}

function ProgressBar({ pct, color = "green" }) {
  return (
    <div className="progress-track">
      <div className={`progress-fill fill-${color}`} style={{ width: `${pct}%` }} />
    </div>
  );
}

function conflictFor(name) {
  return CONFLICTS.find((c) => c.resource.includes(name));
}

function StatCard({ label, value, sub }) {
  return (
    <div className="stat-card">
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

function SectionHead({ reel, title, action }) {
  return (
    <div className="section-head">
      <div>
        <div className="eyebrow">REEL {reel}</div>
        <h1>{title}</h1>
      </div>
      {action}
    </div>
  );
}

      </div>
      <div className="list-panel">

function formatTC(d) {
  const pad = (n) => String(n).padStart(2, "0");
  const ff = Math.floor((d.getMilliseconds() / 1000) * 25);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}:${pad(ff)}`;
}

        .plan-card.active { box-shadow: 0 0 0 2px var(--ink); }
        .plan-tag { position: absolute; top: -10px; right: 16px; background: var(--ink); color: #ffffff; font-family: 'Space Mono', monospace; font-size: 10px; padding: 3px 8px; letter-spacing: 1px; }
        .plan-card h3 { font-family: 'Anton', sans-serif; font-size: 18px; margin: 0; letter-spacing: 1px; }
        .plan-price { font-family: 'Anton', sans-serif; font-size: 26px; }
        .plan-seats { font-size: 12px; }
        .plan-features { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
        .plan-features li { display: flex; align-items: center; gap: 6px; }

        /* Forms */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .form-grid label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--mist); }
        .input, .select { background: #ffffff; border: 1px solid var(--line-strong); padding: 9px 10px; color: var(--text); font-size: 13px; font-family: inherit; }
        .input:disabled { opacity: .6; }

        /* Buttons */
        .btn-primary, .btn-ghost {
          display: inline-flex; align-items: center; gap: 6px;
          font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
          padding: 9px 14px; cursor: pointer; border: 1px solid var(--ink);
          transition: background .12s, color .12s;
        }
        .btn-primary { background: var(--ink); color: #ffffff; }
        .btn-primary:hover { background: #ffffff; color: var(--ink); }
        .btn-ghost { background: #ffffff; color: var(--ink); }
        .btn-ghost:hover { background: var(--ink); color: #ffffff; }
        .btn-primary.small, .btn-ghost.small { padding: 6px 10px; font-size: 10px; }
      `}</style>

      <aside className="sidebar">
        <div className="brand">
          <img src={LOGO_DATA} alt="On The Spot" className="brand-logo" />
        </div>
        <nav>
          {nav.map((item) => {
            const Icon = item.icon;
            return (
              <button key={item.key} className={`nav-item ${view === item.key ? "active" : ""}`} onClick={() => setView(item.key)}>
                <Icon size={16} /> {item.label}
              </button>
            );
          })}
        </nav>
        <div className="role-switch">
          <div className="role-switch-label">Portal Access</div>
          <button className={`role-btn ${role === "studio" ? "active" : ""}`} onClick={() => setRole("studio")}>
            <Building2 size={14} /> Production House
          </button>
          <button className={`role-btn ${role === "client" ? "active" : ""}`} onClick={() => setRole("client")}>
            <UserCircle2 size={14} /> Client Portal
          </button>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{role === "studio" ? "On The Spot — Production HQ" : "On The Spot — Monsoon Heights Client View"}</div>
          <div className="tc-readout">
            {role === "studio" && (
              <button className="bell-btn" onClick={() => setView("messages")} aria-label="Messages">
                <Bell size={16} />
                {MESSAGES.filter((m) => m.unread).length > 0 && (
                  <span className="bell-badge">{MESSAGES.filter((m) => m.unread).length}</span>
                )}
              </button>
            )}
            <Circle size={9} className="tally tally-red" fill="currentColor" />
            <span>{formatTC(time)}</span>
          </div>
        </div>
        <div className="film-divider" />
        {content}
      </div>
    </div>
  );
}

import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
